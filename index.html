<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المسابقة الرمضانية للمهارات الحسابية - منطقة إربد</title>
    
    <!-- خطوط جوجل: خط أميري للعناوين وخط كايرو للنصوص -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- مكتبة Tailwind CSS للتصميم السريع والمتجاوب -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- إعدادات Tailwind -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        cairo: ['Cairo', 'sans-serif'],
                        amiri: ['Amiri', 'serif'],
                    },
                    colors: {
                        un: {
                            blue: '#009edb',
                        }
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'float': 'customFloat 6s ease-in-out infinite',
                    }
                }
            }
        }
    </script>

    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #1e1b4b 0%, #312e81 40%, #701a75 80%, #9d174d 100%);
            margin: 0;
            overflow-x: hidden;
            color: #ffffff;
            min-height: 100vh;
        }

        .islamic-bg {
            position: absolute;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' stroke='%23fef08a' stroke-width='1' stroke-opacity='0.08'%3E%3Cpath d='M40 0l40 40-40 40L0 40z'/%3E%3Cpath d='M20 20h40v40H20z'/%3E%3C/g%3E%3C/svg%3E");
            z-index: 0;
        }

        .stars-bg {
            position: absolute;
            inset: 0;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 40px 70px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(3px 3px at 50px 160px, #fef08a, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 90px 40px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(3px 3px at 130px 80px, #ffffff, rgba(0,0,0,0));
            background-repeat: repeat;
            background-size: 200px 200px;
            opacity: 0.6;
            z-index: 0;
            animation: twinkle 4s infinite alternate;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4), 
                        inset 0 0 20px rgba(255, 255, 255, 0.1);
        }
        
        .gold-text-gradient {
            background: linear-gradient(to bottom, #ffffff 0%, #fef08a 25%, #f59e0b 70%, #b45309 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0px 6px 10px rgba(245, 158, 11, 0.3));
        }

        @keyframes twinkle {
            0% { opacity: 0.3; transform: scale(0.9); }
            100% { opacity: 0.9; transform: scale(1.1); }
        }
        @keyframes customSwing {
            0% { transform: rotate(5deg); }
            100% { transform: rotate(-5deg); }
        }
        @keyframes glowPulse {
            0%, 100% { filter: drop-shadow(0 0 15px rgba(253,224,71,0.6)); }
            50% { filter: drop-shadow(0 0 35px rgba(253,224,71,1)); }
        }
        @keyframes moonGlowPulse {
            0%, 100% { filter: drop-shadow(0 0 20px rgba(253, 224, 71, 0.7)) drop-shadow(0 0 40px rgba(236, 72, 153, 0.4)); transform: scale(1); }
            50% { filter: drop-shadow(0 0 40px rgba(253, 224, 71, 0.9)) drop-shadow(0 0 70px rgba(236, 72, 153, 0.6)); transform: scale(1.03); }
        }

        .lantern-anim {
            animation: customSwing 4s ease-in-out infinite alternate;
            transform-origin: top center;
        }
        
        .moon-glow-anim {
            animation: moonGlowPulse 4s ease-in-out infinite alternate;
        }

        .glow-anim {
            animation: glowPulse 2.5s ease-in-out infinite;
        }
        
        .subscribe-btn {
            background: linear-gradient(135deg, #f59e0b 0%, #ea580c 100%);
            box-shadow: 0 8px 25px rgba(234, 88, 12, 0.5);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            display: inline-flex;
            overflow: hidden;
            border: 2px solid #fde047;
            text-decoration: none;
        }
        .subscribe-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.6), transparent);
            transform: skewX(-25deg);
            transition: 0.6s;
        }
        .subscribe-btn:hover::before {
            left: 150%;
        }
        .subscribe-btn:hover {
            transform: translateY(-5px) scale(1.03);
            box-shadow: 0 12px 35px rgba(245, 158, 11, 0.7);
            border-color: #ffffff;
        }
    </style>
</head>
<body class="flex items-center justify-center p-4 relative min-h-screen">
    
    <div class="islamic-bg"></div>
    <div class="stars-bg"></div>

    <!-- الهلال -->
    <div class="absolute top-6 left-6 md:top-12 md:left-16 w-32 h-32 md:w-48 md:h-48 z-0 moon-glow-anim pointer-events-none text-yellow-300">
        <svg viewBox="0 0 512 512" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="moonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#ffffff" />
                    <stop offset="30%" stop-color="#fef08a" />
                    <stop offset="100%" stop-color="#f59e0b" />
                </linearGradient>
            </defs>
            <path fill="url(#moonGrad)" d="M283.211 512c78.962 0 151.079-35.925 198.857-94.792 7.065-8.708-.639-21.43-11.562-19.35-124.203 23.654-238.262-71.576-238.262-196.954 0-72.222 38.662-138.635 101.498-174.394 9.686-5.512 7.25-20.197-3.756-22.23-25.53-4.707-51.633-7.15-78.25-7.15C127.271 37.13 0 143.581 0 274.565 0 405.549 127.271 512 283.211 512z"/>
        </svg>
    </div>

    <!-- فوانيس -->
    <div class="absolute top-0 right-4 md:right-24 z-10 lantern-anim">
        <div class="w-1 h-16 md:h-24 bg-gradient-to-b from-yellow-100 to-yellow-500 mx-auto"></div>
        <div class="w-16 h-24 md:w-20 md:h-28 text-yellow-300 mx-auto relative -top-1 glow-anim">
            <svg viewBox="0 0 24 36" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 1L9 5H15L12 1Z" fill="#fde047"/>
                <path d="M7 6H17L18 10H6L7 6Z" fill="#ea580c"/>
                <path d="M5 11H19L17 25H7L5 11Z" fill="rgba(253, 224, 71, 0.25)" stroke="#fef08a" stroke-width="1.5"/>
                <circle cx="12" cy="18" r="4" fill="#ffffff" class="animate-pulse" style="filter: blur(2px);"/>
                <path d="M6 26H18L16 30H8L6 26Z" fill="#ea580c"/>
            </svg>
        </div>
    </div>

    <main class="glass-panel rounded-[2.5rem] p-8 md:p-14 max-w-4xl w-full z-20 relative text-center mt-12 md:mt-0">
        
        <header class="mb-8 mt-6 relative z-10">
            <h3 class="text-xl md:text-2xl font-bold text-indigo-100 mb-3 tracking-wide drop-shadow-md">وكالة الغوث الدولية</h3>
            <div class="inline-block bg-white/10 px-8 py-2.5 rounded-full border border-white/30 shadow-[0_8px_15px_rgba(0,0,0,0.2)] backdrop-blur-md">
                <h2 class="text-2xl md:text-3xl font-extrabold text-[#7dd3fc] uppercase tracking-wider">منطقة إربد</h2>
            </div>
        </header>

        <!-- نص الدعوة -->
        <div class="mb-8 relative z-10 text-xl md:text-2xl text-purple-50 leading-relaxed font-semibold">
            <p class="mb-1">تدعو طلبة المدارس في منطقة إربد من</p>
            <p class="text-3xl md:text-4xl text-yellow-300 font-bold my-3">الصف السابع</p>
            <p>للمشاركة في</p>
        </div>

        <!-- العنوان الرئيسي -->
        <div class="py-6 mb-8 relative z-10">
            <div class="absolute inset-0 bg-yellow-400/15 blur-[60px] rounded-full"></div>
            <h1 class="font-amiri text-6xl md:text-8xl lg:text-[6.5rem] font-bold mb-4 gold-text-gradient leading-tight relative z-10">
                المسابقة الرمضانية
            </h1>
            <h2 class="font-amiri text-4xl md:text-6xl font-bold text-white drop-shadow-[0_5px_8px_rgba(107,33,168,0.8)] relative z-10 mt-2">
                للمهارات الحسابية
            </h2>
        </div>

        <!-- زر الاشتراك -->
        <div class="mb-12 relative z-10">
            <a href="Story.html" class="subscribe-btn px-10 py-4 md:py-5 rounded-full text-white text-xl md:text-2xl font-black items-center gap-4 mx-auto animate-pulse-slow">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 md:h-8 md:w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M11 5L19 12L11 19M5 5L13 12L5 19" />
                </svg>
                اشترك الآن في المسابقة
            </a>
        </div>

        <!-- الموعد النهائي -->
        <div class="mb-8 relative z-10">
            <div class="inline-flex flex-col md:flex-row items-center gap-5 bg-gradient-to-r from-fuchsia-900/80 to-purple-900/80 backdrop-blur-md p-3 md:pr-6 md:pl-10 rounded-3xl md:rounded-full shadow-[0_15px_30px_rgba(134,25,143,0.4)] border border-fuchsia-400/40 cursor-default">
                <div class="bg-gradient-to-br from-yellow-200 to-yellow-500 text-purple-900 w-16 h-16 rounded-full flex items-center justify-center text-4xl shadow-[inset_0_2px_5px_rgba(255,255,255,0.8)] font-black">
                    ⏳
                </div>
                <div class="pb-2 md:pb-0 text-center md:text-right">
                    <p class="text-sm md:text-base text-fuchsia-200 font-bold mb-1">آخر موعد لاستقبال المشاركات</p>
                    <p class="text-3xl md:text-4xl font-black text-transparent bg-clip-text bg-gradient-to-l from-white to-yellow-200 tracking-wider">٢٥ رمضان</p>
                </div>
            </div>
        </div>

        <!-- التذييل -->
        <footer class="mt-8 border-t border-white/20 pt-8 relative z-10">
            <p class="text-indigo-200 text-sm md:text-base font-semibold mb-2">إعداد الخبيرة التربوية</p>
            <p class="font-amiri text-3xl md:text-4xl font-bold text-yellow-300 tracking-wide">انتصار مصطفى</p>
        </footer>

    </main>

</body>
</html>
